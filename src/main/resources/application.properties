
# Grok (xAI) API Configuration
openai.api.key=${GROK_API_KEY}
openai.api.url=${GROK_API_URL:https://api.x.ai/v1/chat/completions}
openai.model=${GROK_MODEL:grok-beta}
openai.max.tokens=${GROK_MAX_TOKENS:500}

# Chatbot Topic Configuration
chatbot.topic=${CHATBOT_TOPIC:college}
chatbot.name=${CHATBOT_NAME:CollegeBot}
chatbot.welcome.message=${CHATBOT_WELCOME_MESSAGE:Hi! I am CollegeBot. Ask me anything about admissions, courses, fees, or campus life!}

# Server Configuration
server.port=${PORT:8080}